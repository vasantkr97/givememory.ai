services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: givememory-postgres
    environment:
      POSTGRES_DB: givememory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - givememory-postgres:/var/lib/postgresql/data

volumes:
  givememory-postgres:
