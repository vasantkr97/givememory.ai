services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recalllayer-postgres
    environment:
      POSTGRES_DB: recalllayer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - recalllayer-postgres:/var/lib/postgresql/data

volumes:
  recalllayer-postgres:
